<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes App</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen">

  <div class="flex h-full">

    <div class="w-1/2 bg-white p-6 overflow-y-auto border-r">
      <h2 class="text-2xl font-bold mb-4">Your Notes</h2>

      <div id="notesContainer" class="space-y-3">
      </div>
    </div>

    <div class="w-1/2 p-6 flex flex-col justify-start">
      <h2 class="text-2xl font-bold mb-4">Create Note</h2>

      <input 
        id="noteInput"
        type="text"
        placeholder="Enter your note..."
        class="border p-3 rounded mb-4 w-full focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <button 
        onclick="addNote()"
        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition"
      >
        Add Note
      </button>
    </div>

  </div>

  <script>
    async function addNote() {
        const input = document.getElementById("noteInput")
        const text = input.value.trim();
        if(text === "")return;
        await axios.post('http://localhost:3000/notes',{
            note : text
        },{
          headers : {
            token : localStorage.getItem('token')
          }
        })
        input.value = ""
        getNotes()
    }
    async function getNotes(){
        const res = await axios.get('http://localhost:3000/notes',{
          headers : {
            token : localStorage.getItem('token')
          }
        })
        const notes = res.data.note
        const container = document.getElementById("notesContainer");
        container.innerText = "";
        for(let i=0;i<notes.length;i++){
            const div = document.createElement("div")
            div.className = "p-3 bg-gray-200 rounded";
            div.innerText = notes[i].note;
            container.appendChild(div)
        }
    }
    getNotes()
  </script>

</body>
</html>
